# Ingress is the "front door" — it routes external HTTP traffic
# to your services based on URL path.
#
# /api/*  → gazette-api (port 8000)
# /*      → gazette-frontend (port 80)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gazette-ingress
  namespace: neural-gazette
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # API routes: /api/* goes to the API service
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: gazette-api
                port:
                  number: 8000
          # Everything else goes to the frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gazette-frontend
                port:
                  number: 80
