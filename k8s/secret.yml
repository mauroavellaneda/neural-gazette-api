# Secrets store sensitive data (passwords, API keys).
# Values must be base64-encoded. We'll create this via command line
# instead of committing real values here.
#
# Create it with:
#   kubectl -n neural-gazette create secret generic gazette-secrets \
#     --from-literal=DATABASE_URL='postgresql://...' \
#     --from-literal=GROQ_API_KEY='...' \
#     --from-literal=CRON_SECRET='...'
#
# This file is a template showing the structure:
apiVersion: v1
kind: Secret
metadata:
  name: gazette-secrets
  namespace: neural-gazette
type: Opaque
# data:
#   DATABASE_URL: <base64-encoded>
#   GROQ_API_KEY: <base64-encoded>
#   CRON_SECRET: <base64-encoded>
